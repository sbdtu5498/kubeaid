{{- if .Values.oncall.ciliumNetworkPolicy.enabled }}
---
# Allow oncall-engine egress to internal cluster services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Values.oncall.releaseName }}-engine-networkpolicy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Values.oncall.releaseName }}
      app.kubernetes.io/component: engine

# =========
# EGRESS
# =========

  egress:
    - toEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: {{ .Values.oncall.releaseName }}
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            k8s:cnpg.io/cluster: oncall-pgsql
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalPostgresql.port | default 5432 }}"
              protocol: TCP

    # Allow to RabbitMQ service
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: oncall-rabbitmq
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalRabbitmq.port | default 5672 }}"
              protocol: TCP

  {{- if .Values.oncall.redis.enabled }}
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
            app.kubernetes.io/instance: {{ .Values.oncall.releaseName }}
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
  {{- else }}
    # Allow to external Redis service
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ .Values.oncall.externalRedis.host }}
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalRedis.port | default 6379 }}"
              protocol: TCP
  {{- end }}

    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            k8s:app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: {{ .Values.oncall.releaseName }}
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP

  # Allow oncall-engine egress to external services
  {{- if .Values.oncall.ciliumNetworkPolicy.fqdns.enabled }}
  # DNS proxy intercepts these queries to build IP-to-domain cache
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.oncall.ciliumNetworkPolicy.dns.namespace }}
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"

    - toFQDNs:
        - matchName: "{{ .Values.oncall.ciliumNetworkPolicy.fqdns.telegram }}"
      {{- if .Values.oncall.ciliumNetworkPolicy.fqdns.keycloak }}
        - matchName: "{{ .Values.oncall.ciliumNetworkPolicy.fqdns.keycloak }}"
      {{- end }}
      {{- if .Values.oncall.ciliumNetworkPolicy.fqdns.googleStorage }}
        - matchName: "{{ .Values.oncall.ciliumNetworkPolicy.fqdns.googleStorage }}"
      {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- end }}

# ========
# INGRESS
# ========

  ingress:
    # Allow from Traefik ingress controller
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.oncall.ciliumNetworkPolicy.traefik.namespace }}
            {{- range $key, $value := .Values.oncall.ciliumNetworkPolicy.traefik.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Allow from oncall-grafana
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            k8s:app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: {{ .Values.oncall.releaseName }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
{{- end }}
