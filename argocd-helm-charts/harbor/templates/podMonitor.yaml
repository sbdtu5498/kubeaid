{{- if 
    .Values.postgres.monitoring.enablePodMonitor 
}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ if .Values.postgres.recover }}{{ .Release.Name }}-pgsql-recover{{ else }}{{ .Release.Name }}-pgsql{{ end }}
  namespace: {{ .Release.Namespace }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      cnpg.io/cluster: {{ if .Values.postgres.recover }}{{ .Release.Name }}-pgsql-recover{{ else }}{{ .Release.Name }}-pgsql{{ end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s
      scrapeTimeout: 10s
{{- end }}