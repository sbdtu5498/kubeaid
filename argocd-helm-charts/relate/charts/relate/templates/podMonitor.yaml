{{- if 
    .Values.postgresql.monitoring.enablePodMonitor 
}}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ if (.Values.cnpg).recover }}relate-pgsql-recover{{ else }}relate-pgsql{{ end }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      cnpg.io/cluster: {{ if (.Values.cnpg).recover }}relate-pgsql-recover{{ else }}relate-pgsql{{ end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s
      scrapeTimeout: 10s
{{- end }}