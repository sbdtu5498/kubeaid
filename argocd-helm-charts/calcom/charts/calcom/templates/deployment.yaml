apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "calcom.fullname" . }}
  labels:
    {{- include "calcom.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "calcom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "calcom.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              # Format ALLOWED_HOSTNAMES to be JSON-compatible (POSIX-compliant)
              # The Cal.com code does: JSON.parse(`[${process.env.ALLOWED_HOSTNAMES || ""}]`)
              # So ALLOWED_HOSTNAMES needs to be formatted as quoted strings separated by commas
              # Example: "host1.com","host2.com" so it becomes ["host1.com","host2.com"]
              if [ -n "$ALLOWED_HOSTNAMES" ]; then
                # Check if it's already JSON-formatted (starts with quote)
                case "$ALLOWED_HOSTNAMES" in
                  \"*)
                    # Already formatted, do nothing
                    ;;
                  *)
                    # Format: handle comma-separated hostnames
                    # Replace commas with "," and wrap the whole thing
                    if echo "$ALLOWED_HOSTNAMES" | grep -q ','; then
                      # Multiple hostnames: format each one
                      FORMATTED=""
                      OLD_IFS="$IFS"
                      IFS=','
                      for host in $ALLOWED_HOSTNAMES; do
                        host=$(echo "$host" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
                        if [ -n "$host" ]; then
                          if [ -n "$FORMATTED" ]; then
                            FORMATTED="$FORMATTED,\"$host\""
                          else
                            FORMATTED="\"$host\""
                          fi
                        fi
                      done
                      IFS="$OLD_IFS"
                      export ALLOWED_HOSTNAMES="$FORMATTED"
                    else
                      # Single hostname: just wrap in quotes
                      export ALLOWED_HOSTNAMES="\"$ALLOWED_HOSTNAMES\""
                    fi
                    ;;
                esac
              fi
              # First, resolve a known failing migration on fresh v6.1.10 installs.
              # This migration only adds an index; if it fails once, Prisma marks it as failed
              # and refuses to continue (P3009). Since you don't need existing data, it's safe
              # to mark it as applied on a new database before running the full deploy.
              echo "Resolving known failed migration (index only, safe on fresh DBs)..."
              npx prisma migrate resolve \
                --applied "20260130000000_add_selected_calendar_channel_id_index" \
                --schema /calcom/packages/prisma/schema.prisma || true

              # Run database migrations with retry logic to handle advisory lock timeouts.
              # Prisma P1002 (advisory lock timeout) can happen if multiple pods start simultaneously.
              # If migrations don't run, Cal.com will crash later with Prisma P2021 (missing tables like public.users/public.Feature).
              echo "Running database migrations..."
              MAX_RETRIES=5
              RETRY_DELAY=10
              for i in $(seq 1 $MAX_RETRIES); do
                if npx prisma migrate deploy --schema /calcom/packages/prisma/schema.prisma; then
                  echo "Migrations completed successfully"
                  break
                else
                  if [ $i -eq $MAX_RETRIES ]; then
                    echo "ERROR: Migrations failed after $MAX_RETRIES attempts. Exiting."
                    exit 1
                  fi
                  echo "Migration attempt $i failed. Retrying in $RETRY_DELAY seconds..."
                  sleep $RETRY_DELAY
                fi
              done
              # Replace build-time URLs baked into static JS/HTML files with the
              # actual runtime URL. Next.js inlines NEXT_PUBLIC_* env vars at
              # build time, so without this every client-side redirect goes to
              # whatever URL was used during `next build`.
              #
              # We handle TWO cases:
              #   1. The image was built with the placeholder kept intact
              #      (fixed Dockerfile) → replace "http://NEXT_PUBLIC_WEBAPP_URL_PLACEHOLDER"
              #   2. The image was built with the old Dockerfile that already
              #      replaced the placeholder with "http://localhost:3000"
              #      → replace "http://localhost:3000"
              if [ -n "$NEXT_PUBLIC_WEBAPP_URL" ]; then
                echo "Replacing build-time URLs with runtime URL: $NEXT_PUBLIC_WEBAPP_URL"
                # Case 1: placeholder still present (preferred / new images)
                /calcom/scripts/replace-placeholder.sh "http://NEXT_PUBLIC_WEBAPP_URL_PLACEHOLDER" "$NEXT_PUBLIC_WEBAPP_URL" || true
                # Case 2: localhost:3000 baked in (legacy images)
                if [ "$NEXT_PUBLIC_WEBAPP_URL" != "http://localhost:3000" ]; then
                  /calcom/scripts/replace-placeholder.sh "http://localhost:3000" "$NEXT_PUBLIC_WEBAPP_URL" || true
                fi
                # Tell Cal.com that the *built* URL now matches the runtime URL.
                # orgDomains.ts compares NEXT_PUBLIC_WEBAPP_URL against
                # BUILT_NEXT_PUBLIC_WEBAPP_URL to decide hostname validity.
                export BUILT_NEXT_PUBLIC_WEBAPP_URL="$NEXT_PUBLIC_WEBAPP_URL"
              fi
              # Start the application (standalone mode)
              exec node apps/web/server.js
          env:
            {{- $secretRef  := .Values.secretRef -}}
            {{- $webappUrl := default "" .Values.webappUrl -}}
            {{- $useSecretUrl := eq $webappUrl "" -}}
            {{- range tuple "NEXTAUTH_SECRET" "CALENDSO_ENCRYPTION_KEY" }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  key: {{ . }}
                  name: {{ $secretRef }}
            {{- end}}
            - name: NEXT_PUBLIC_WEBAPP_URL
            {{- if $useSecretUrl }}
              valueFrom:
                secretKeyRef:
                  key: NEXT_PUBLIC_WEBAPP_URL
                  name: {{ $secretRef }}
            {{- else }}
              value: {{ $webappUrl | quote }}
            {{- end }}
            # Override build-time URL baked into the image (BUILT_NEXT_PUBLIC_WEBAPP_URL),
            # so Cal.com stops thinking it's running on http://localhost:3000.
            # This is what orgDomains.ts actually uses when comparing hostnames.
            - name: BUILT_NEXT_PUBLIC_WEBAPP_URL
            {{- if $useSecretUrl }}
              valueFrom:
                secretKeyRef:
                  key: NEXT_PUBLIC_WEBAPP_URL
                  name: {{ $secretRef }}
            {{- else }}
              value: {{ $webappUrl | quote }}
            {{- end }}
            # Cal.com uses WEBAPP_URL (server-side) in a few places; if it's unset it falls back to http://localhost:3000.
            # Keep NEXT_PUBLIC_WEBAPP_URL as the source of truth and derive WEBAPP_URL/NEXTAUTH_URL from it.
            - name: WEBAPP_URL
            {{- if $useSecretUrl }}
              valueFrom:
                secretKeyRef:
                  key: NEXT_PUBLIC_WEBAPP_URL
                  name: {{ $secretRef }}
            {{- else }}
              value: {{ $webappUrl | quote }}
            {{- end }}
            - name: NEXTAUTH_URL
            {{- if $useSecretUrl }}
              valueFrom:
                secretKeyRef:
                  key: NEXT_PUBLIC_WEBAPP_URL
                  name: {{ $secretRef }}
            {{- else }}
              value: {{ $webappUrl | quote }}
            {{- end }}
            # WEBSITE_URL is used in JWT verification and some redirect flows (see getServerSideProps.tsx)
            # Set it to match WEBAPP_URL to ensure redirects go to the correct domain
            - name: WEBSITE_URL
            {{- if $useSecretUrl }}
              valueFrom:
                secretKeyRef:
                  key: NEXT_PUBLIC_WEBAPP_URL
                  name: {{ $secretRef }}
            {{- else }}
              value: {{ $webappUrl | quote }}
            {{- end }}

            # Use the CloudNativePG-generated app secret as the source of truth for database credentials.
            # This avoids SealedSecret drift (calcom secret having an outdated DB password).
            # The secret name is stable (`calcom-pgsql-app`) in this chart.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: calcom-pgsql-app
                  key: uri
            - name: DATABASE_DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: calcom-pgsql-app
                  key: uri
            # Increase Prisma advisory lock timeout to reduce P1002 errors during concurrent migrations
            - name: PRISMA_MIGRATE_ENGINE_ADVISORY_LOCK_TIMEOUT
              value: "60000"
            - name: ALLOWED_HOSTNAMES
              valueFrom:
                secretKeyRef:
                  key: ALLOWED_HOSTNAMES
                  name: {{ $secretRef }}
                  optional: true

            {{- range tuple
              "AB_TEST_BUCKET_PROBABILITY"
              "API_KEY_PREFIX"
              "APP_ROUTER_APPS_CATEGORIES_CATEGORY_ENABLED"
              "APP_ROUTER_APPS_CATEGORIES_ENABLED"
              "APP_ROUTER_APPS_ENABLED"
              "APP_ROUTER_APPS_INSTALLED_CATEGORY_ENABLED"
              "APP_ROUTER_APPS_SLUG_ENABLED"
              "APP_ROUTER_APPS_SLUG_SETUP_ENABLED"
              "APP_ROUTER_BOOKINGS_STATUS_ENABLED"
              "APP_ROUTER_EVENT_TYPES_ENABLED"
              "APP_ROUTER_GETTING_STARTED_STEP_ENABLED"
              "APP_ROUTER_SETTINGS_ADMIN_ENABLED"
              "APP_ROUTER_SETTINGS_TEAMS_ENABLED"
              "APP_ROUTER_TEAMS_ENABLED"
              "APP_ROUTER_VIDEO_ENABLED"
              "APP_ROUTER_WORKFLOWS_ENABLED"
              "AUTH_BEARER_TOKEN_CLOUDFLARE"
              "AUTH_BEARER_TOKEN_VERCEL"
              "AVATARAPI_PASSWORD"
              "AVATARAPI_USERNAME"
              "BASECAMP3_CLIENT_ID"
              "BASECAMP3_CLIENT_SECRET"
              "BASECAMP3_USER_AGENT"
              "CALCOM_APP_CREDENTIAL_ENCRYPTION_KEY"
              "CALCOM_CREDENTIAL_SYNC_ENDPOINT"
              "CALCOM_CREDENTIAL_SYNC_HEADER_NAME"
              "CALCOM_CREDENTIAL_SYNC_SECRET"
              "CALCOM_LICENSE_KEY"
              "CALCOM_TELEMETRY_DISABLED"
              "CAL_SIGNATURE_TOKEN"
              "CLOSECOM_API_KEY"
              "CLOUDFLARE_DNS"
              "CLOUDFLARE_TURNSTILE_SECRET"
              "CLOUDFLARE_VERCEL_CNAME"
              "CLOUDFLARE_ZONE_ID"
              "CRON_API_KEY"
              "CRON_ENABLE_APP_SYNC"
              "CSP_POLICY"
              "DAILY_API_KEY"
              "DAILY_MEETING_ENDED_WEBHOOK_SECRET"
              "DAILY_SCALE_PLAN"
              "DAILY_WEBHOOK_SECRET"
              "E2E_TEST_APPLE_CALENDAR_EMAIL"
              "E2E_TEST_APPLE_CALENDAR_PASSWORD"
              "E2E_TEST_CALCOM_GCAL_KEYS"
              "E2E_TEST_CALCOM_QA_EMAIL"
              "E2E_TEST_CALCOM_QA_GCAL_CREDENTIALS"
              "E2E_TEST_CALCOM_QA_PASSWORD"
              "E2E_TEST_MAILHOG_ENABLED"
              "E2E_TEST_OIDC_CLIENT_ID"
              "E2E_TEST_OIDC_CLIENT_SECRET"
              "E2E_TEST_OIDC_PROVIDER_DOMAIN"
              "E2E_TEST_OIDC_USER_EMAIL"
              "E2E_TEST_OIDC_USER_PASSWORD"
              "E2E_TEST_SAML_ADMIN_EMAIL"
              "E2E_TEST_SAML_ADMIN_PASSWORD"
              "EDGE_CONFIG"
              "EMAIL_FROM"
              "EMAIL_FROM_NAME"
              "EMAIL_SERVER_HOST"
