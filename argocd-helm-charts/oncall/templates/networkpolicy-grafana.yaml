{{- if and .Values.ciliumNetworkPolicy.enabled .Values.oncall.grafana.enabled }}
---
# EGRESS
# Allow oncall-grafana egress to oncall-engine and external auth services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-grafana-egress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  egress:
    # Allow DNS lookups to kube-dns (required for toFQDNs to work)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.ciliumNetworkPolicy.dns.namespace }}
            {{- range $key, $value := .Values.ciliumNetworkPolicy.dns.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*"

    # Allow to oncall-engine API
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: engine
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP

    # Allow to keycloak
  {{- if .Values.ciliumNetworkPolicy.external.fqdns.enabled }}
    # DNS-based filtering for specific external services
    - toFQDNs:
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.telegram }}"
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.keycloak }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.keycloak }}"
      {{- end }}
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.grafana }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.grafana }}"
      {{- end }}
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.googleStorage }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.googleStorage }}"
      {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Fallback: IP-based filtering (until DNS proxy is fully functional)
    - toCIDRSet:
        - cidr: 149.154.160.0/20  # Telegram
        - cidr: 91.108.4.0/22     # Telegram
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- else if .Values.ciliumNetworkPolicy.external.allowAllHTTPS }}
    # Allow all HTTPS traffic
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- else if .Values.ciliumNetworkPolicy.external.ipBlocks }}
    - toCIDRSet:
    {{- range .Values.ciliumNetworkPolicy.external.ipBlocks }}
        - cidr: {{ . }}
    {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- end }}
---
#INGRESS
# Allow ingress traffic to oncall-grafana
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-grafana-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      k8s:app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: {{ .Release.Name }}
  ingress:
    # Allow from Traefik ingress controller (if Grafana is exposed)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.ciliumNetworkPolicy.traefik.namespace }}
            {{- range $key, $value := .Values.ciliumNetworkPolicy.traefik.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP

    # Allow from oncall-engine (required for plugin initialization callbacks)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: engine
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
{{- end }}
