{{- if .Values.ciliumNetworkPolicy.enabled }}
---
# EGRESS
# Allow oncall-engine egress to internal cluster services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-engine-egress-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: engine
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:cnpg.io/cluster: oncall-pgsql
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalPostgresql.port | default 5432 }}"
              protocol: TCP

    # Allow to RabbitMQ service
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: oncall-rabbitmq
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalRabbitmq.port | default 5672 }}"
              protocol: TCP

 {{- if .Values.oncall.redis.enabled }}
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
  {{- else }}
    # Allow to external Redis service
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ .Values.oncall.externalRedis.host }}
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalRedis.port | default 6379 }}"
              protocol: TCP
  {{- end }}

    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            k8s:app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
# Allow oncall-engine egress to external services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-engine-egress-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: engine
  egress:
  {{- if .Values.ciliumNetworkPolicy.external.fqdns.enabled }}
    # DNS-based filtering for specific external services
    - toFQDNs:
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.telegram }}"
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.keycloak }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.keycloak }}"
      {{- end }}
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.grafana }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.grafana }}"
      {{- end }}
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.googleStorage }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.googleStorage }}"
      {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Fallback: IP-based filtering (until DNS proxy is fully functional)
    - toCIDRSet:
        - cidr: 149.154.160.0/20  # Telegram
        - cidr: 91.108.4.0/22     # Telegram
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- else if .Values.ciliumNetworkPolicy.external.allowAllHTTPS }}
    # Allow all HTTPS traffic
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- else if .Values.ciliumNetworkPolicy.external.ipBlocks }}
    - toCIDRSet:
    {{- range .Values.ciliumNetworkPolicy.external.ipBlocks }}
        - cidr: {{ . }}
    {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- end }}
---
#INGRESS
# Allow ingress traffic from Traefik to oncall-engine
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-engine-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: engine
  ingress:
    # Allow from Traefik ingress controller
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Values.ciliumNetworkPolicy.traefik.namespace }}
            {{- range $key, $value := .Values.ciliumNetworkPolicy.traefik.labels }}
            {{ $key }}: {{ $value }}
            {{- end }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Allow from oncall-grafana
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            k8s:app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
{{- end }}
