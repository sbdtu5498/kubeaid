{{- if .Values.ciliumNetworkPolicy.enabled }}
---
# EGRESS
# Allow oncall-celery egress to internal cluster services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-celery-egress-internal
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: celery
  egress:
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: oncall-pgsql
            io.kubernetes.pod.namespace: {{ .Release.Namespace }}
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalPostgresql.port | default 5432 }}"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: oncall-rabbitmq
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalRabbitmq.port | default 5672 }}"
              protocol: TCP

  {{- if .Values.oncall.redis.enabled }}
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
            app.kubernetes.io/instance: {{ .Release.Name }}
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
  {{- else }}
    # Allow to external Redis service
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: {{ .Values.oncall.externalRedis.host }}
      toPorts:
        - ports:
            - port: "{{ .Values.oncall.externalRedis.port | default 6379 }}"
              protocol: TCP
  {{- end }}
---
# Allow oncall-celery egress to external services
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "oncall.fullname" . }}-celery-egress-external
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: celery
  egress:
  {{- if .Values.ciliumNetworkPolicy.external.fqdns.enabled }}
    # DNS-based filtering for specific external services
    - toFQDNs:
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.telegram }}"
      {{- if .Values.ciliumNetworkPolicy.external.fqdns.keycloak }}
        - matchName: "{{ .Values.ciliumNetworkPolicy.external.fqdns.keycloak }}"
      {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Fallback: IP-based filtering for Telegram (until DNS proxy is fixed)
    - toCIDRSet:
        - cidr: 149.154.160.0/20 
        - cidr: 91.108.4.0/22 
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- else if .Values.ciliumNetworkPolicy.external.allowAllHTTPS }}
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- else if .Values.ciliumNetworkPolicy.external.ipBlocks }}
    - toCIDRSet:
    {{- range .Values.ciliumNetworkPolicy.external.ipBlocks }}
        - cidr: {{ . }}
    {{- end }}
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
  {{- end }}
{{- end }}
