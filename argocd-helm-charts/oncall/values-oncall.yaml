oncall:
  grafanaPluginInstall:
    enabled: true
  base_url: test-oncall.kcm.obmondo.com
  grafana:
    persistence:
      enabled: true
      size: 2Gi
    plugins: []
    grafana.ini:
      analytics:
        check_for_updates: false
      plugins:
        preinstall_sync_enabled: false
      server:
        domain: test-oncall.kcm.obmondo.com
        root_url: https://test-oncall.kcm.obmondo.com/grafana
      auth:
        disable_login_form: false
        disable_signout_menu: false
        signout_redirect_url: 'https://keycloak.obmondo.com/auth/realms/Obmondo/protocol/openid-connect/logout?redirect_uri=https://test-oncall.kcm.obmondo.com/grafana'
      auth.generic_oauth:
        enabled: true
        allow_sign_up: true
        scopes: 'openid profile email'
        name: 'Keycloak'
        auth_url: 'https://keycloak.obmondo.com/auth/realms/Obmondo/protocol/openid-connect/auth'
        token_url: 'https://keycloak.obmondo.com/auth/realms/Obmondo/protocol/openid-connect/token'
        api_url: 'https://keycloak.obmondo.com/auth/realms/Obmondo/protocol/openid-connect/userinfo'
        client_id: 'grafana'
        role_attribute_path: "contains(not_null(roles[*],''), 'Admin') && 'Admin' || contains(not_null(roles[*],''), 'Editor') && 'Editor' || contains(not_null(roles[*],''), 'Viewer') && 'Viewer'|| ''"
    env:
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: true
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: grafana-oncall-app
    image:
      pullSecrets:
        - harbor-registry-secret
    extraInitContainers:
      - name: install-oncall-plugin
        # We are pulling plugin v1.6.1 from harbor - above this version, plugin and engine were not compatible with one another, so we are pinning to these versions.
        image: harbor.obmondo.com/obmondo/oras:v1.3.0
        command: [sh, /scripts/install-plugin.sh]
        env:
          - name: HARBOR_USER
            valueFrom:
              secretKeyRef:
                name: oncall-plugin-config
                key: username
          - name: HARBOR_PASSWORD
            valueFrom:
              secretKeyRef:
                name: oncall-plugin-config
                key: password
          - name: HARBOR_PLUGIN_REF
            valueFrom:
              secretKeyRef:
                name: oncall-plugin-config
                key: plugin
        volumeMounts:
          - name: storage
            mountPath: /var/lib/grafana
          - name: plugin-install-script
            mountPath: /scripts
    extraVolumes:
      - name: plugin-install-script
        configMap:
          name: oncall-grafana-plugin-install
          defaultMode: 0755
      # defining extraVolumes in the parent values REPLACES (not appends to)
      # the subchart defaults, so we must explicitly include this provisioning volume.
      - name: provisioning
        configMap:
          name: helm-testing-grafana-plugin-provisioning
    envValueFrom:
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
        secretKeyRef:
          key: grafana-keycloak-secret
          name: oncall-grafana-keycloak
  oncall:
    telegram:
      enabled: true
      webhookUrl: https://test-oncall.kcm.obmondo.com
      existingSecret: telegram-bot-token
      tokenKey: telegram-token
  redis:
    image:
      registry: docker.io
      repository: bitnamilegacy/redis
      tag: 6.2.7-debian-11-r11
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: traefik-cert-manager
      cert-manager.io/cluster-issuer: letsencrypt
  backup:
    enabled: false
    cloud: "aws"
    destinationPath: s3://kcm-test-oncall-postgres-backups
    endpointURL: https://s3.obmondo.com
  recover: false


global:
  netpol:
    enabled: true
    releaseName: test-oncall
    traefik:
      namespace: grafana
      labels:
        app.kubernetes.io/instance: traefik

  postgresql:
    instanceName: oncall-pgsql
    netpol: true
    size: 70Gi
    clients:
      - labels:
          app.kubernetes.io/instance: test-oncall
          app.kubernetes.io/component: engine
      - labels:
          app.kubernetes.io/instance: test-oncall
          app.kubernetes.io/component: celery
    cnpg:
      labels:
        app.kubernetes.io/name: cloudnative-pg
        io.kubernetes.pod.namespace: cloudnative-pg

  celery:
    netpol: true

  engine:
    netpol: true

  redis:
    netpol: true
    enabled: true

  grafana:
    netpol: true
