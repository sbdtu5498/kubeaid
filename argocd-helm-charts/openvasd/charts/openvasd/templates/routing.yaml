{{- if .Values.routing.enabled -}}
{{- $svcPort := .Values.service.port -}}
{{- $hostname := .Values.routing.hostname | default "" -}}
{{- if eq .Values.openvasd.tls.certificates.deploy_server true }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: openvasd-route
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
   - websecure
  routes:
  - match: {{ if $hostname }}HostSNIRegexp(`{{ $hostname }}`){{ else }}HostSNI(`*`){{ end }}
    services:
    - name: openvasd
      port: {{ $svcPort }}
  tls:
    passthrough: true
{{ else }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: openvasd-route
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
   - web
  routes:
  - match: {{ if $hostname }}HostRegexp(`{{ $hostname }}`){{ else }}PathPrefix(`/`){{ end }}
    kind: Rule
    services:
    - name: openvasd
      port: {{ $svcPort }}
{{ end }}
{{- end }}
