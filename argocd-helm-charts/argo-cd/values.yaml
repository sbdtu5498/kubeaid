argo-cd:
  global:
    revisionHistoryLimit: 2
  # to make this chart work with helm 3 - it does still install CRDs
  installCRDs: false
  # find latest tag here: https://github.com/argoproj/argo-helm/blob/master/charts/argo-cd/Chart.yaml (AppVersion)
  dex:
    enabled: false
    resources:
      limits:
        memory: 64Mi
      requests:
        cpu: 1m
        memory: 32Mi
  repoServer:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 128Mi
    replicas: 1
    autoscaling:
      enabled: false
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  server:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 5m
        memory: 128Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
    config:
      resource.exclusions: |
        - apiGroups:
          - "velero.io"
          kinds:
          - "Backup"
          clusters:
          - "*"
  controller:
    resources:
      limits:
        memory: 1500Mi
      requests:
        cpu: 250m
        memory: 700Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
  redis:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 2m
        memory: 64Mi
    metrics:
      enabled: true
      image:
        repository: bitnami/redis-exporter
      serviceMonitor:
        enabled: true
  notifications:
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 2m
        memory: 64Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true

  configs:
    cm:
      # For ArgoCD-CrossPlane integration, we need to use annotation based application resource
      # tracking.
      #
      # You ask why? Let me explain :
      #
      # Suppose, we define an XR claim (which is namespace scoped) in our git repository. The
      # 'infrastructure' ArgoCD App is tracking this XR Claim.
      # The XR Claim will dynamically generate an XR (which is cluster scoped). And this XR will
      # derive the 'argocd.argoproj.io/instance' label from its parent XR Claim.
      #
      # So, the situation is : we have a dynamically generated XR, not defined in git, but being
      # tracked by ArgoCD, because of that derived label.
      # This will cause the 'infrastructure' ArgoCD App to be always out of sync. Additionally,
      # if someone syncs the 'infrastructure' ArgoCD App, with pruning enabled, then ArgoCD will
      # delete those XRs.
      application.resourceTrackingMethod: annotation
      resource.exclusions: |
        ### Network resources created by the Kubernetes control plane and excluded to reduce the number of watched events and UI clutter
        - apiGroups:
          - ''
          - discovery.k8s.io
          kinds:
          - Endpoints
          - EndpointSlice
        ### Internal Kubernetes resources excluded reduce the number of watched events
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
        ### Internal Kubernetes Authz/Authn resources excluded reduce the number of watched events
        - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
          kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
        ### Intermediate Certificate Request excluded reduce the number of watched events
        - apiGroups:
          - certificates.k8s.io
          kinds:
          - CertificateSigningRequest
        - apiGroups:
          - cert-manager.io
          kinds:
          - CertificateRequest
        ### Cilium internal resources excluded reduce the number of watched events and UI Clutter
        - apiGroups:
          - cilium.io
          kinds:
          - CiliumIdentity
          - CiliumEndpoint
          - CiliumEndpointSlice
        ### Kyverno intermediate and reporting resources excluded reduce the number of watched events and improve performance
        - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
          kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest
        ### Velero : excluded the number of watched backups
        - apiGroups:
          - velero.io
          kinds:
          - Backup


kubeaidAppProject:
  enabled: true

blackbox:
  probe: true
