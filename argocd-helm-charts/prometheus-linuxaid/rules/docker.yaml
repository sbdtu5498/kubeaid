groups:
  - name: monitor::system::docker
    rules:
      - alert: monitor::system::docker::status
        expr: |
          (
            time() - max by (certname, name)
            (container_last_seen{name!~"^runner.", name!~"^GITEA-ACTIONS-TASK.", name!~"^buildx_buildkit_builder.*", name!="mailcow-backup"})   > 900
          ) and on(certname) obmondo_monitoring{alert_id="monitor::system::docker::status"} > 0
        for: 15m
        labels:
          alert_id: monitor::system::docker::status
          severity: critical
        annotations:
          summary: "Docker container {{$labels.name}} is down on host {{ $labels.certname }}"
          description: "Docker container **{{ $labels.name }}** is down since from 15min on server **{{ $labels.certname }}**"
