---
evaluation_interval: 1m

rule_files:
  - ../rules/security.yaml

tests:
  # Test 1: scan failing on 3 nodes — should fire a single grouped alert
  - interval: 1m
    input_series:
      - series: 'security_exporter_scan_up{certname="web01.enableit"}'
        values: 0x120
      - series: 'security_exporter_scan_up{certname="web02.enableit"}'
        values: 0x120
      - series: 'security_exporter_scan_up{certname="web03.enableit"}'
        values: 0x120
      - series: 'security_exporter_scan_up{certname="db01.enableit"}'
        values: 1x120

    alert_rule_test:
      - alertname: 'monitor::security::scan::failing'
        eval_time: 2h
        exp_alerts:
          - exp_labels:
              severity: warning
              alert_id: 'monitor::security::scan::failing'
            exp_annotations:
              summary: 'Security scan failing on 3 node(s)'
              description: |-2
                3 node(s) have not been able to submit vulnerability scan
                results to the Vuls server. This could be due to the Vuls server being
                down, network issues, or the security exporter service failing.

                Get the list of affected nodes:
                ```
                security_exporter_scan_up == 0
                ```

  # Test 2: all scans succeeding — no alert should fire
  - interval: 1m
    input_series:
      - series: 'security_exporter_scan_up{certname="web01.enableit"}'
        values: 1x120
      - series: 'security_exporter_scan_up{certname="web02.enableit"}'
        values: 1x120

    alert_rule_test:
      - alertname: 'monitor::security::scan::failing'
        eval_time: 2h
        exp_alerts: []

  # Test 3: stale scan — no successful scan in 25+ hours
  - interval: 1m
    input_series:
      - series: 'security_exporter_last_scan_timestamp{certname="web01.enableit"}'
        values: 0x1700
      - series: 'security_exporter_last_scan_timestamp{certname="web02.enableit"}'
        values: 0x1700

    alert_rule_test:
      - alertname: 'monitor::security::scan::stale'
        eval_time: 27h
        exp_alerts:
          - exp_labels:
              severity: warning
              alert_id: 'monitor::security::scan::stale'
            exp_annotations:
              summary: 'Security scan results stale on 2 node(s)'
              description: |-2
                2 node(s) have not completed a successful vulnerability
                scan in more than 25 hours. The scan interval is 12h, so this means
                at least 2 consecutive scans have failed or not run.

                Get the list of affected nodes:
                ```
                time() - security_exporter_last_scan_timestamp > 90000
                ```
