{{- if .Values.gfetch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "puppetserver.name" . }}-gfetch
  namespace: {{ .Release.Namespace | quote }}
  labels:
    app.kubernetes.io/component: gfetch
spec:
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/component: gfetch
{{- end }}
