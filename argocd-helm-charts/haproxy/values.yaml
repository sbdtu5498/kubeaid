haproxy:
  # This is necessary to clear the default ports. They cannot be cleared in a
  # cluster value file because of a bug in helm.
  # See https://github.com/helm/helm/issues/9027
  containerPorts:
    http: null
    https: null
    stat: null

  # Restrict haproxy to control-plane nodes only.
  # haproxy proxies kube-controller-manager, kube-scheduler and etcd metrics
  # via 127.0.0.1 — processes that only run on control-plane nodes.
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
