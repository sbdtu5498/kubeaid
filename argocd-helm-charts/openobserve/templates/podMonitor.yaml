{{- if .Values.cnpg.monitoring.enablePodMonitor }}
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{- if .Values.cnpg.recover }}openobserve-pgsql-recover{{- else }}openobserve-pgsql{{- end }}
  namespace: {{ .Release.Namespace }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      cnpg.io/cluster: {{- if .Values.cnpg.recover }}openobserve-pgsql-recover{{- else }}openobserve-pgsql{{- end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s
      scrapeTimeout: 10s
{{- end }}