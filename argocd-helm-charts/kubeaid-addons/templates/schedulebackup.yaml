{{- if and ((.Values.global).postgresql).enabled (((.Values.global).postgresql).backup).enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: backup-pgsql
spec:
  schedule: "0 0 0 * * *"
  immediate: true
  backupOwnerReference: self
  cluster:
    name: oncall-pgsql
{{- end }}
