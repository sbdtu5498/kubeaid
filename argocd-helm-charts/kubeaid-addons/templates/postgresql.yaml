{{- if ((.Values.global).postgresql).enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  {{- if .Values.global.postgresql.recover }}
  name: oncall-pgsql-recover
  {{- else }}
  name: oncall-pgsql
  {{- end }}
spec:
  instances: {{ .Values.global.postgresql.instance | default 1 }}
  {{- if .Values.global.postgresql.recover }}
  bootstrap:
    recovery: oncall-pgsql
  {{- else }}
  bootstrap:
    initdb:
      database: oncall
      owner: oncall
  {{- end }}
  resources:
    limits:
      memory: {{ ((.Values.global.postgresql).resources).limits | dig "memory" "800Mi" }}
      # As its required to add the cpu limit, have added the issue here
      # https://github.com/cloudnative-pg/cloudnative-pg/issues/2586
      cpu: "2"
    requests:
      memory: {{ ((.Values.global.postgresql).resources).requests | dig "memory" "500Mi" }}
      cpu: {{ ((.Values.global.postgresql).resources).requests | dig "cpu" "100m" }}
  storage:
    size: {{ .Values.global.postgresql.size | default "2Gi" }}
    {{- if .Values.global.postgresql.storageClass }}
    storageClass: {{ .Values.global.postgresql.storageClass }}
    {{- end }}
  {{- if .Values.global.postgresql.recover }}
  externalClusters:
    name: oncall-pgsql
    barmanObjectStore:
      destinationPath: {{ .Values.global.postgresql.backup.destinationPath }}
      endpointURL: {{ .Values.global.postgresql.backup.endpointURL }}
      {{- if eq .Values.global.postgresql.backup.cloud "aws" }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: ACCESS_SECRET_KEY
      {{- end }}
      {{- if eq .Values.global.postgresql.backup.cloud "azure" }}
      azureCredentials:
        connectionString:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.connectionString.key }}
        storageAccount:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.storageAccount.key }}
        storageKey:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.storageKey.key }}
        storageSasToken:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.storageSasToken.key }}
      {{- end }}
      wal:
        maxParallel: 8
  {{- end }}
  {{- if .Values.global.postgresql.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.global.postgresql.backup.destinationPath }}
      endpointURL: {{ .Values.global.postgresql.backup.endpointURL }}
      {{- if eq .Values.global.postgresql.backup.cloud "aws" }}
      s3Credentials:
        accessKeyId:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: ACCESS_SECRET_KEY
      {{- end }}
      {{- if eq .Values.global.postgresql.backup.cloud "azure" }}
      azureCredentials:
        connectionString:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.connectionString.key }}
        storageAccount:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.storageAccount.key }}
        storageKey:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.storageKey.key }}
        storageSasToken:
          name: {{ .Values.global.postgresql.backup.secretName }}
          key: {{ .Values.global.postgresql.backup.azureCredentials.storageSasToken.key }}
      {{- end }}
      wal:
        compression: gzip
        encryption: AES256
    retentionPolicy: "30d"
  {{- end }}
{{- end }}
