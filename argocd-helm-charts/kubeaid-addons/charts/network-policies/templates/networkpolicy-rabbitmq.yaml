{{- if and .Values.global.netpol.enabled .Values.global.rabbitmq.netpol }}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ .Values.global.netpol.releaseName }}-rabbitmq-networkpolicy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: cilium-networkpolicy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
      app.kubernetes.io/instance: {{ .Values.global.netpol.releaseName }}

# =========
# EGRESS
# =========

  egress:
    # Allow RabbitMQ to query Kubernetes API for StatefulSet peer discovery
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            component: kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP

# ======
#INGRESS
# ======

  ingress:
    # Allow from oncall-engine and oncall-celery
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            app.kubernetes.io/instance: {{ .Values.global.netpol.releaseName }}
            app.kubernetes.io/component: engine
      toPorts:
        - ports:
            - port: "5672"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ .Release.Namespace }}
            app.kubernetes.io/instance: {{ .Values.global.netpol.releaseName }}
            app.kubernetes.io/component: celery
      toPorts:
        - ports:
            - port: "5672"
              protocol: TCP
{{- end }}
