image:
  cve:
    repository: vuls/go-cve-dictionary
    pullPolicy: IfNotPresent
    tag: "v0.16.0"

# This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

#This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}

securityContext: {}

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports

  goCVEDictionary:
    port: 1323

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /go-cve-dictionary
          pathType: Prefix
          servicePort: 1323
  vulsServer:
    enabled: false
    hosts:
      - host: chart-example.local
        paths:
          - path: /vuls
            pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

nodeSelector: {}

tolerations: []

affinity: {}

schedule: "0 2 1,15 * *"


cve:
  enabled: true
  fetchDB:
    - nvd
  # Fetch CVEs starting from this year up to the current year.
  # The seed job does a full historical fetch; the recurring job only refreshes recent years.
  yearsFrom: 2022
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

postgresql:
  instances: 1
  size: 5Gi
  storageClass: ""
  revision: "3"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  backups:
    enabled: false
  recover:
    enabled: false
    revision: "1"
  monitoring: {}

vulsExporter:
  enabled: false
  image:
    repository: ghcr.io/obmondo/vuls-exporter
    tag: 1.0.0-9bd9ca5
    pullPolicy: IfNotPresent
  obmondo:
    url: ""
  interval: "12h"
  tls:
    secretName: ""
    certFile: /etc/ssl/vuls-exporter/tls.crt
    keyFile: /etc/ssl/vuls-exporter/tls.key
    caFile: ""
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

# vuls2 unified database.
# In vuls v0.38.6+, vuls2 detection is ALWAYS active regardless of this flag.
# This flag only controls whether init containers pre-fetch the vuls-nightly-db.
# When false, no init containers run but vuls2 detection still executes (using
# default path, which may fail if no db is present).
# See: https://github.com/future-architect/vuls/issues/2457
vuls2:
  enabled: true
  image:
    repository: ghcr.io/vulsio/vuls-nightly-db
    tag: "0"
    pullPolicy: IfNotPresent

vulsServer:
  enabled: true
  image:
    repository: vuls/vuls
    tag: "v0.38.6"
    pullPolicy: IfNotPresent
  port: 5515
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 100m
      memory: 512Mi
  resultsStorage:
    storageClass: ""
    size: 15Gi
    accessMode: ReadWriteOnce
