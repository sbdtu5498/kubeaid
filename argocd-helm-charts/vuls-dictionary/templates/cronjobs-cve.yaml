{{- if .Values.cve.enabled }}
{{- $dictionaries := .Values.cve.fetchDB -}}
{{- $pgHost := printf "%s-pgsql-cve-rw" (include "vuls-dictionary.fullname" .) -}}
{{- $currentYear := now | date "2006" | atoi -}}
{{- $yearsFrom := .Values.cve.yearsFrom | default 2022 | int -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "vuls-dictionary.fullname" . }}-cve-fetch-jobs
spec:
  suspend: false
  schedule: {{ .Values.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            {{- range $index, $dict := $dictionaries }}
            - name: {{ include "vuls-dictionary.fullname" $ }}-cve-{{ $dict }}
              securityContext:
                {{- toYaml $.Values.securityContext | nindent 16 }}
              image: "{{ $.Values.image.cve.repository }}:{{ $.Values.image.cve.tag | default $.Chart.AppVersion }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command:
                - go-cve-dictionary
                - fetch
                - {{ $dict }}
                - --dbtype
                - postgres
                - --dbpath
                - $(DB_PATH)
                {{- range untilStep $yearsFrom (add1 $currentYear | int) 1 }}
                - "{{ . }}"
                {{- end }}
              env:
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "vuls-dictionary.fullname" $ }}-pgsql-cve-app
                      key: password
                - name: DB_PATH
                  value: "host={{ $pgHost }} port=5432 user=vuls dbname=vuls password=$(DB_PASSWORD) sslmode=require"
              resources:
                {{- toYaml ($.Values.cve.resources | default $.Values.resources) | nindent 16 }}
            {{- end }}
{{- end }}
