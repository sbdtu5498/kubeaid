{{- if .Values.vulsServer.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vuls-dictionary.fullname" . }}-vuls-config
  labels:
    {{- include "vuls-dictionary.labels" . | nindent 4 }}
data:
  config.toml: |
    {{- if .Values.cve.enabled }}
    [cveDict]
    type = "http"
    url = "http://{{ include "vuls-dictionary.fullname" . }}-dict-server:{{ .Values.service.goCVEDictionary.port }}"
    {{- end }}

    [vuls2]
    Path = "/vuls/vuls.db"
    SkipUpdate = true
{{- end }}
