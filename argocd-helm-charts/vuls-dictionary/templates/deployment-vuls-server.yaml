{{- if .Values.vulsServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vuls-dictionary.fullname" . }}-vuls-server
  labels:
    {{- include "vuls-dictionary.labels" . | nindent 4 }}
    app.kubernetes.io/component: vuls-server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vuls-dictionary.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vuls-server
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vuls-dictionary.labels" . | nindent 8 }}
        app.kubernetes.io/component: vuls-server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vuls-dictionary.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: vuls-server
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.vulsServer.image.repository }}:{{ .Values.vulsServer.image.tag }}"
          imagePullPolicy: {{ .Values.vulsServer.image.pullPolicy }}
          args:
            - server
            - -listen
            - "0.0.0.0:{{ .Values.vulsServer.port }}"
            - -to-localfile
          ports:
            - name: http-vuls
              containerPort: {{ .Values.vulsServer.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http-vuls
            initialDelaySeconds: 30
          readinessProbe:
            tcpSocket:
              port: http-vuls
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.vulsServer.resources | nindent 12 }}
          volumeMounts:
            - name: results
              mountPath: /vuls
            - name: config
              mountPath: /vuls/config.toml
              subPath: config.toml
              readOnly: true
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: {{ include "vuls-dictionary.fullname" . }}-results-pvc
        - name: config
          configMap:
            name: {{ include "vuls-dictionary.fullname" . }}-vuls-config
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
