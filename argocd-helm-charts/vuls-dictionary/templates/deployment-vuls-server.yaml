{{- if .Values.vulsServer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vuls-dictionary.fullname" . }}-vuls-server
  labels:
    {{- include "vuls-dictionary.labels" . | nindent 4 }}
    app.kubernetes.io/component: vuls-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "vuls-dictionary.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vuls-server
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vuls-dictionary.labels" . | nindent 8 }}
        app.kubernetes.io/component: vuls-server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vuls-dictionary.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.vuls2.enabled }}
      initContainers:
        - name: fetch-vuls2-db
          image: ghcr.io/oras-project/oras:v1.2.2
          command: ["sh", "-c"]
          args:
            - |
              echo "pulling vuls2 nightly db..."
              oras pull -o /vuls "{{ .Values.vuls2.image.repository }}:{{ .Values.vuls2.image.tag }}"
          volumeMounts:
            - name: results
              mountPath: /vuls
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: decompress-vuls2-db
          image: alpine:3.21
          command: ["sh", "-c"]
          args:
            - |
              apk add --no-cache zstd
              echo "decompressing vuls.db.zst..."
              unzstd -f /vuls/vuls.db.zst -o /vuls/vuls.db
              rm -f /vuls/vuls.db.zst
              ls -lh /vuls/vuls.db
          volumeMounts:
            - name: results
              mountPath: /vuls
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      {{- end }}
      containers:
        - name: vuls-server
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.vulsServer.image.repository }}:{{ .Values.vulsServer.image.tag }}"
          imagePullPolicy: {{ .Values.vulsServer.image.pullPolicy }}
          args:
            - server
            - -listen
            - "0.0.0.0:{{ .Values.vulsServer.port }}"
            - -config=/vuls/config.toml
            - -results-dir=/vuls/results
            - -to-localfile
          ports:
            - name: http-vuls
              containerPort: {{ .Values.vulsServer.port }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: http-vuls
            initialDelaySeconds: 30
          readinessProbe:
            tcpSocket:
              port: http-vuls
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.vulsServer.resources | nindent 12 }}
          volumeMounts:
            - name: results
              mountPath: /vuls
            - name: config
              mountPath: /vuls/config.toml
              subPath: config.toml
              readOnly: true
        {{- if .Values.vulsExporter.enabled }}
        - name: vuls-exporter
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.vulsExporter.image.repository }}:{{ .Values.vulsExporter.image.tag }}"
          imagePullPolicy: {{ .Values.vulsExporter.image.pullPolicy }}
          args:
            - -c
            - /etc/vuls-exporter/config.yaml
          resources:
            {{- toYaml .Values.vulsExporter.resources | nindent 12 }}
          volumeMounts:
            - name: results
              mountPath: /vuls
              readOnly: true
            - name: vuls-exporter-config
              mountPath: /etc/vuls-exporter
              readOnly: true
            {{- if .Values.vulsExporter.tls.secretName }}
            - name: vuls-exporter-tls
              mountPath: /etc/ssl/vuls-exporter
              readOnly: true
            {{- end }}
        {{- end }}
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: {{ include "vuls-dictionary.fullname" . }}-results-pvc
        - name: config
          configMap:
            name: {{ include "vuls-dictionary.fullname" . }}-vuls-config
        {{- if .Values.vulsExporter.enabled }}
        - name: vuls-exporter-config
          configMap:
            name: {{ include "vuls-dictionary.fullname" . }}-vuls-exporter-config
        {{- if .Values.vulsExporter.tls.secretName }}
        - name: vuls-exporter-tls
          secret:
            secretName: {{ .Values.vulsExporter.tls.secretName }}
        {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
