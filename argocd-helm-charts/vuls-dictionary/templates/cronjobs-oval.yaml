{{- if .Values.oval.enabled }}
{{- $oval := .Values.oval.fetchDB -}}
{{- $scheduleParts := splitList " " $.Values.schedule -}}
{{- $baseMinute := atoi (index $scheduleParts 0) -}}
{{- $baseHour := atoi (index $scheduleParts 1) -}}
{{- $spreadMinutes := $.Values.scheduleSpreadMinutes | default 5 | int -}}
{{- $scheduleRest := printf "%s %s %s" (index $scheduleParts 2) (index $scheduleParts 3) (index $scheduleParts 4) -}}
{{- range $index, $distro := (keys $oval | sortAlpha) -}}
{{- $versions := index $oval $distro -}}
{{- $totalMinutes := add $baseMinute (mul (add1 $index) $spreadMinutes) -}}
{{- $minute := mod $totalMinutes 60 -}}
{{- $hour := mod (add $baseHour (div $totalMinutes 60)) 24 -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "vuls-dictionary.fullname" $ }}-oval-{{ $distro }}-fetch-jobs
spec:
  suspend: false
  schedule: "{{ $minute }} {{ $hour }} {{ $scheduleRest }}"
  jobTemplate:
    spec:
      template:
        spec:
          volumes:
            - name: dictionary
              persistentVolumeClaim:
                claimName: {{ include "vuls-dictionary.fullname" $ }}-pvc
          restartPolicy: OnFailure
          containers:
            - name: {{ include "vuls-dictionary.fullname" $ }}-oval-{{ $distro }}
              securityContext:
                {{- toYaml $.Values.securityContext | nindent 16 }}
              image: "{{ $.Values.image.oval.repository }}:{{ $.Values.image.oval.tag | default $.Chart.AppVersion }}"
              imagePullPolicy: {{ $.Values.image.pullPolicy }}
              command:
                - goval-dictionary
                - fetch
                {{- if eq $distro "sles-server" }}
                - suse
                - --suse-type
                - suse-enterprise-server
                {{- else }}
                - {{ $distro }}
                {{- end }}
                {{- range $version := $versions }}
                - {{ $version | quote }}
                {{- end }}
              resources:
                {{- toYaml $.Values.resources | nindent 16 }}
              volumeMounts:
                - name: dictionary
                  mountPath: /go-cve-dictionary
---
{{- end }}
{{- end }}
