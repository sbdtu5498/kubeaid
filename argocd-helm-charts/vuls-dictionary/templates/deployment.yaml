{{- $pgHost := printf "%s-pgsql-rw" (include "vuls-dictionary.fullname" .) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vuls-dictionary.fullname" . }}-dict-server
  labels:
    {{- include "vuls-dictionary.labels" . | nindent 4 }}
    app.kubernetes.io/component: dict-server
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vuls-dictionary.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dict-server
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vuls-dictionary.labels" . | nindent 8 }}
        app.kubernetes.io/component: dict-server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vuls-dictionary.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL to be ready..."
              until nc -z -w 2 {{ $pgHost }} 5432; do
                echo "PostgreSQL not ready yet, retrying in 5s..."
                sleep 5
              done
              echo "PostgreSQL is ready."
      containers:
        {{- if .Values.cve.enabled }}
        - name: {{ .Chart.Name }}-cve
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.cve.repository }}:{{ .Values.image.cve.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - server
            - --bind
            - 0.0.0.0
            - --dbtype
            - postgres
            - --dbpath
            - $(DB_PATH)
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vuls-dictionary.fullname" . }}-pgsql-app
                  key: password
            - name: DB_PATH
              value: "host={{ $pgHost }} port=5432 user=vuls dbname=vuls password=$(DB_PASSWORD) sslmode=require"
          ports:
            - name: http-go-cve
              containerPort: {{ .Values.service.goCVEDictionary.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http-go-cve
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http-go-cve
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
        {{- if .Values.oval.enabled }}
        - name: {{ .Chart.Name }}-oval
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.oval.repository }}:{{ .Values.image.oval.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - server
            - --bind
            - 0.0.0.0
            - --dbtype
            - postgres
            - --dbpath
            - $(DB_PATH)
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vuls-dictionary.fullname" . }}-pgsql-app
                  key: password
            - name: DB_PATH
              value: "host={{ $pgHost }} port=5432 user=vuls dbname=vuls password=$(DB_PASSWORD) sslmode=require"
          ports:
            - name: http-goval
              containerPort: {{ .Values.service.govalDictionary.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http-goval
            initialDelaySeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http-goval
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
