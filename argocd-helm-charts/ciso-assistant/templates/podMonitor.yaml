{{- if .Values.postgres.monitoring.enablePodMonitor 
}}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: {{ if .Values.postgres.recover }}ciso-assistant-pgsql-recover{{ else }}ciso-assistant-pgsql{{ end }}
  namespace: {{ .Release.Namespace }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      cnpg.io/cluster: {{ if .Values.postgres.recover }}ciso-assistant-pgsql-recover{{ else }}ciso-assistant-pgsql{{ end }}
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s
      scrapeTimeout: 10s
{{- end }}