{{/* Handling node-groups in Hetzner Bare Metal. */}}
{{- if or (eq .Values.mode "bare-metal") (eq .Values.mode "hybrid") }}
{{- range $nodeGroupIndex, $nodeGroup := $.Values.nodeGroups.bareMetal }}
{{- range $hostIndex, $host := $nodeGroup.bareMetalHosts }}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfig
metadata:
  name: {{ printf "%s-%s-%s" $.Values.global.clusterName $nodeGroup.name $host.serverID }}
spec:
  files:
    - content: |
        net.ipv4.conf.lxc*.rp_filter = 0
      owner: root:root
      path: /etc/sysctl.d/99-cilium.conf
      permissions: "0744"
    - content: |
        overlay
        br_netfilter
      owner: root:root
      path: /etc/modules-load.d/crio.conf
      permissions: "0744"
    - content: |
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1
      owner: root:root
      path: /etc/sysctl.d/99-kubernetes-cri.conf
      permissions: "0744"
    - content: |
        vm.overcommit_memory=1
        kernel.panic=10
        kernel.panic_on_oops=1
      owner: root:root
      path: /etc/sysctl.d/99-kubelet.conf
      permissions: "0744"
    - content: |
        nameserver 1.1.1.1
        nameserver 1.0.0.1
        nameserver 2606:4700:4700::1111
      owner: root:root
      path: /etc/kubernetes/resolv.conf
      permissions: "0744"
    - content: |
        # Copyright The containerd Authors.
        #
        # Licensed under the Apache License, Version 2.0 (the "License");
        # you may not use this file except in compliance with the License.
        # You may obtain a copy of the License at
        #
        #     http://www.apache.org/licenses/LICENSE-2.0
        #
        # Unless required by applicable law or agreed to in writing, software
        # distributed under the License is distributed on an "AS IS" BASIS,
        # WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        # See the License for the specific language governing permissions and
        # limitations under the License.
        #
        # https://raw.githubusercontent.com/containerd/containerd/main/containerd.service

        [Unit]
        Description=containerd container runtime
        Documentation=https://containerd.io
        After=network.target local-fs.target dbus.service

        [Service]
        ExecStartPre=-/sbin/modprobe overlay
        ExecStart=/usr/local/bin/containerd

        Type=notify
        Delegate=yes
        KillMode=process
        Restart=always
        RestartSec=5

        # Having non-zero Limit*s causes performance problems due to accounting overhead
        # in the kernel. We recommend using cgroups to do container-local accounting.
        LimitNPROC=infinity
        LimitCORE=infinity

        # Comment TasksMax if your systemd version does not supports it.
        # Only systemd 226 and above support this version.
        TasksMax=infinity
        OOMScoreAdjust=-999

        [Install]
        WantedBy=multi-user.target
      owner: root:root
      path: /etc/systemd/system/containerd.service
      permissions: "0744"
  joinConfiguration:
    nodeRegistration:
      kubeletExtraArgs:
        anonymous-auth: "false"
        authentication-token-webhook: "true"
        authorization-mode: Webhook
        cloud-provider: external
        event-qps: "5"
        kubeconfig: /etc/kubernetes/kubelet.conf
        max-pods: "220"
        read-only-port: "0"
        resolv-conf: /etc/kubernetes/resolv.conf
        rotate-server-certificates: "true"
        tls-cipher-suites: TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256,TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384,TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305,TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_256_GCM_SHA384,TLS_RSA_WITH_AES_128_GCM_SHA256
  preKubeadmCommands:
    - set -x

    {{/* Give highest priority to the Network Card / Connection entry in the boot order.
          Otherwise, we cannot boot the servers into rescue mode, and need to reach out to the
          Hetzner support team. */}}
    - |
      NETBOOT=$(efibootmgr -v \
        | grep -E "Network (Card|Connection)" \
        | sed 's/Boot\([0-9A-F]*\).*/\1/' \
        | head -n1)
      CURRENT_ORDER=$(efibootmgr | grep "BootOrder:" | cut -d' ' -f2)
      NEW_ORDER=$(echo "$CURRENT_ORDER" | sed "s/$NETBOOT,\?//g" | sed "s/^/$NETBOOT,/" | sed 's/,$//')
      efibootmgr -o $NEW_ORDER

    - export NETWORK_INTERFACE=$(ip route get 8.8.8.8 | awk '{print $5; exit}')

    {{- if (eq $.Values.mode "hybrid") -}}
    {{/* Attach the Hetzner Bare Metal server to the Hetzner Network using VSwitch. */}}
    - |
      ip link add link $NETWORK_INTERFACE name $NETWORK_INTERFACE.4000 type vlan id {{ $.Values.bareMetal.vSwitch.vlanID }}
      ip link set $NETWORK_INTERFACE.4000 mtu 1400
      ip link set dev $NETWORK_INTERFACE.4000 up

      ip addr add {{ $host.privateIP }}/24 dev $NETWORK_INTERFACE.4000
      ip route add 10.0.0.0/16 via 10.0.1.1

    {{/* We can't disable the public IP, since CAPH periodically tries to SSH into the node using
         its public IP. If it's not able to SSH, it'll think that the node is down, and will keep
         restarting it. */}}
    {{/*
    - |
      export PUBLIC_IP=$(ip addr show $NETWORK_INTERFACE | awk '/inet / {print $2; exit}')
      ip addr del $PUBLIC_IP dev $NETWORK_INTERFACE
    
      export PUBLIC_IPV6=$(ip addr show $NETWORK_INTERFACE | awk '/inet6 / && /global/ {print $2; exit}')
      ip addr del $PUBLIC_IPV6 dev $NETWORK_INTERFACE
    */}}

    {{/* Route egress traffic to the internet, to the NAT gateway. */}}
    - |
      ip route add default via 10.0.1.1
      resolvectl dns $NETWORK_INTERFACE.4000 1.1.1.1
    {{- end -}}

    {{/*
      User provided commands used to setup the disk layout.
      We recommend the following :
          
        (1) If NVMe, then create a ZPool out of the available storage space.
            That ZPool will be used by Kubernetes ephemeral volumes, pod logs and OpenEBS ZFS
            LocalPV provisioner.
              
        (2) If HDD / regular SSD, then create a partition out of the available storage space,
            allocating it to Rook Ceph.
    */}}
    - |
        wget https://github.com/Archisman-Mridha/KubeAid/releases/download/kubeaid-storagectl/kubeaid-storagectl
        chmod +x ./kubeaid-storagectl
        ./kubeaid-storagectl plan execute --os-size {{ $.Values.bareMetal.installImage.vg0.size }} --zfs-pool-size {{ $nodeGroup.zfs.size }}

    - grep VERSION= /etc/os-release; uname -a
    - export CONTAINERD=1.7.25
    - export RUNC=1.2.3
    - export KUBERNETES_VERSION=$(echo {{ $.Values.global.kubernetes.version }} | sed 's/^v//')
    - export TRIMMED_KUBERNETES_VERSION=$(echo {{ $.Values.global.kubernetes.version }} | sed 's/^v//'
      | awk -F . '{print $1 "." $2}')
    - ARCH="$(dpkg --print-architecture)"
    - localectl set-locale LANG=en_US.UTF-8
    - localectl set-locale LANGUAGE=en_US.UTF-8
    - apt-get update -y
    - apt-get -y install at jq unzip wget socat mtr logrotate apt-transport-https
    - sed -i '/swap/d' /etc/fstab
    - swapoff -a
    - modprobe overlay && modprobe br_netfilter && sysctl --system
    - wget https://github.com/opencontainers/runc/releases/download/v$RUNC/runc.$ARCH
    - wget https://github.com/opencontainers/runc/releases/download/v$RUNC/runc.sha256sum
    - sha256sum --check --ignore-missing runc.sha256sum
    - install runc.$ARCH /usr/local/sbin/runc
    - rm -f runc.$ARCH runc.sha256sum
    - wget https://github.com/containerd/containerd/releases/download/v$CONTAINERD/containerd-$CONTAINERD-linux-$ARCH.tar.gz
    - wget https://github.com/containerd/containerd/releases/download/v$CONTAINERD/containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
    - sha256sum --check containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
    - tar -zxf containerd-$CONTAINERD-linux-$ARCH.tar.gz -C /usr/local
    - rm -f containerd-$CONTAINERD-linux-$ARCH.tar.gz containerd-$CONTAINERD-linux-$ARCH.tar.gz.sha256sum
    - mkdir -p /etc/containerd
    - containerd config default > /etc/containerd/config.toml
    - sed -i  "s/SystemdCgroup = false/SystemdCgroup = true/" /etc/containerd/config.toml
    - systemctl daemon-reload && systemctl enable containerd && systemctl start
      containerd
    - mkdir -p /etc/apt/keyrings/
    - curl -fsSL https://pkgs.k8s.io/core:/stable:/v$TRIMMED_KUBERNETES_VERSION/deb/Release.key
      | sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
    - echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v$TRIMMED_KUBERNETES_VERSION/deb/
      /" | sudo tee /etc/apt/sources.list.d/kubernetes.list
    - apt-get update
    - apt-get install -y kubelet="$KUBERNETES_VERSION-*" kubeadm="$KUBERNETES_VERSION-*"
      kubectl="$KUBERNETES_VERSION-*" bash-completion && apt-mark hold kubelet kubectl
      kubeadm && systemctl enable kubelet
    - kubeadm config images pull --kubernetes-version $KUBERNETES_VERSION
    - echo 'source <(kubectl completion bash)' >>/root/.bashrc
    - echo 'export KUBECONFIG=/etc/kubernetes/admin.conf' >>/root/.bashrc
    - apt-get -y autoremove && apt-get -y clean all
    {{- if (gt (len $.Values.global.additionalUsers) 0) }}
    users:
      {{- range $index, $additionalUser := $.Values.global.additionalUsers }}
      - name: {{ $additionalUser.name }}
        sshAuthorizedKeys:
          - {{ $additionalUser.sshPublicKey }}
      {{- end }}
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
